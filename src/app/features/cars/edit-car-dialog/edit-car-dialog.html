<div
  data-backdrop
  class="fixed inset-0 z-[1100] flex items-center justify-center bg-black/60 p-4"
  (click)="onBackdropClick($event)">
  <div
    role="dialog"
    aria-modal="true"
    aria-labelledby="edit-car-title"
    class="w-full max-w-md rounded-lg border border-gray-700 bg-gray-800 p-6 shadow-xl"
    (click)="$event.stopPropagation()">
    <h2 id="edit-car-title" class="mb-4 text-xl font-semibold text-white">Edit car</h2>
    <app-car-form
      [car]="car()"
      submitLabel="Save"
      savingLabel="Saving..."
      (submitForm)="submitForm.emit($event)"
      (cancel)="closeDialog.emit()" />
  </div>
</div>
