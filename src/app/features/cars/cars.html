<div class="p-4 md:p-6">
  <header class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <h1 class="text-2xl font-bold text-white">Cars</h1>
    <button
      type="button"
      class="inline-flex items-center justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900">
      Add car
    </button>
  </header>

  @if (errors$ | async) {
    <p class="mb-4 text-red-400">Error loading cars. Please try again.</p>
  }

  @if (cars$ | async; as cars) {
    @if (cars.length === 0) {
      <p class="text-gray-400">No cars found.</p>
    } @else {
      <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        @for (car of cars; track car.id) {
          <app-car-card [car]="car" />
        }
      </div>
    }
  }
</div>
